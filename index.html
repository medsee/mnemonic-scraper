<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>TON REAL SCANNER TEST MODE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/tonweb@0.0.66/dist/tonweb.js"></script>
</head>

<body class="bg-black text-blue-400 font-mono p-5">

<div class="max-w-xl mx-auto border border-blue-900 p-6 rounded-xl bg-slate-950">
    <h1 class="text-center text-xl font-bold mb-4">TON REAL-TIME SCANNER (TEST MODE)</h1>

    <div id="terminal"
         class="h-64 overflow-y-auto bg-black p-3 text-[10px] border border-blue-900/50 mb-4 rounded">
        <p>> System initialized. Ready.</p>
    </div>

    <button id="startBtn"
            class="w-full bg-blue-700 text-white py-3 rounded hover:bg-blue-600 transition">
        START SCANNING
    </button>

    <div class="mt-4 text-[10px] text-slate-500">
        <p>Mode: <span class="text-yellow-400 font-bold">TEST ONLY</span></p>
        <p>Method: Random Mnemonic → v4R2</p>
    </div>
</div>


<script>
    const tonweb = new TonWeb();
    const terminal = document.getElementById('terminal');

    let running = false;
    let wordList = [];

    function log(msg, color = "text-blue-300") {
        const p = document.createElement('p');
        p.className = color;
        p.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}`;
        terminal.prepend(p);
        if (terminal.childNodes.length > 100) terminal.lastChild.remove();
    }

    async function loadWords() {
        const res = await fetch(
            "https://raw.githubusercontent.com/bitcoin/bips/master/bip-0039/english.txt"
        );
        wordList = (await res.text()).trim().split("\n");
        log("Wordlist loaded (2048 words).", "text-green-400");
    }

    async function deriveWallet() {
        const mnemonic = [];
        for (let i = 0; i < 24; i++)
            mnemonic.push(wordList[Math.random() * wordList.length | 0]);

        const phrase = mnemonic.join(" ");

        let seed;
        try {
            seed = await tonweb.utils.mnemonicToSeed(mnemonic);
        } catch {
            log("Seed error.", "text-red-500");
            return;
        }

        const kp = tonweb.utils.keyPairFromSeed(seed);

        const Wallet = tonweb.wallet.all['v4R2'];
        const wallet = new Wallet(tonweb.provider, {publicKey: kp.publicKey});
        const address = await wallet.getAddress();

        return address.toString(true, true, true);
    }

    async function checkOnce() {
        try {
            const addr = await deriveWallet();
            log(`Checking ${addr.slice(0, 14)}...`, "text-slate-500");
        } catch (e) {
            log("Provider error: API limit.", "text-red-400");
        }
    }

    async function loop() {
        if (!running) return;
        await checkOnce();
        setTimeout(loop, 900);   // API limit safe delay
    }

    document.getElementById('startBtn').onclick = async function () {
        if (wordList.length === 0) await loadWords();

        running = !running;

        this.innerText = running ? "STOP" : "START SCANNING";
        this.className = running ?
            "w-full bg-red-800 text-white py-3 rounded" :
            "w-full bg-blue-700 text-white py-3 rounded";

        if (running) loop();
    };
</script>

</body>
</html>
