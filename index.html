<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mnemonic Scraper Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0f172a] text-white min-h-screen flex flex-col items-center justify-center p-4">
    
    <div class="max-w-xl w-full bg-[#1e293b] p-8 rounded-2xl shadow-2xl border border-slate-700">
        <div class="text-center mb-6">
            <h1 class="text-3xl font-bold text-blue-400">🔍 Mnemonic Finder</h1>
            <p class="text-slate-400 text-sm mt-2">Matn ichidan 12 va 24 talik kalitlarni ajratib olish</p>
        </div>
        
        <div class="mb-4">
            <label class="block text-xs font-semibold text-slate-500 uppercase mb-2">Tekshirish uchun matnni kiriting:</label>
            <textarea id="inputText" class="w-full p-4 bg-[#0f172a] border border-slate-700 rounded-xl text-sm text-green-400 focus:ring-2 focus:ring-blue-500 outline-none transition-all" rows="6" placeholder="Masalan: apple banana cherry... (yoki uzunroq matn)"></textarea>
        </div>

        <button id="scanBtn" class="w-full bg-blue-600 hover:bg-blue-500 active:scale-95 transition-all p-4 rounded-xl font-bold text-lg shadow-lg mb-6">
            Matnni skanerlash
        </button>

        <div class="bg-[#0f172a] p-4 rounded-lg border border-slate-700 font-mono text-sm max-h-60 overflow-y-auto">
            <div id="terminal" class="text-green-400">
                <p class="text-slate-500 italic"># Natijalar bu yerda ko'rinadi...</p>
            </div>
        </div>
    </div>

    <script>
        const btn = document.getElementById('scanBtn');
        const input = document.getElementById('inputText');
        const terminal = document.getElementById('terminal');

        btn.addEventListener('click', () => {
            const text = input.value.trim();
            
            if (text.length < 10) {
                alert("Iltimos, tekshirish uchun matn kiriting!");
                return;
            }

            btn.disabled = true;
            btn.innerText = "Tahlil qilinmoqda...";
            terminal.innerHTML = "<p class='text-blue-400 font-bold'>> SKANERLASH BOSHLANDI...</p>";

            setTimeout(() => {
                // 12-24 ta so'zdan iborat mnemonic pattern
                // Bu kod matn ichidan ketma-ket kelgan inglizcha so'zlarni qidiradi
                const pattern = /\b([a-z]{3,}\s+){11,23}[a-z]{3,}\b/gi;
                const matches = text.match(pattern);

                if (matches) {
                    terminal.innerHTML += `<p class='text-yellow-400'>> TOPILDI: ${matches.length} ta ehtimoliy kalit.</p>`;
                    matches.forEach((m, index) => {
                        const wordCount = m.split(/\s+/).length;
                        terminal.innerHTML += `<div class='mt-4 p-2 bg-slate-800 rounded border border-blue-900'>
                            <p class='text-blue-300 font-bold'># Kalit #${index + 1} (${wordCount} talik):</p>
                            <p class='text-white mt-1 break-words'>${m}</p>
                        </div>`;
                    });
                } else {
                    terminal.innerHTML += "<p class='text-red-400 mt-2'>> XATO: Matn ichida 12 yoki 24 talik kalit so'zlar topilmadi.</p>";
                    terminal.innerHTML += "<p class='text-slate-500 text-xs mt-1'>> Eslatma: So'zlar orasida faqat bitta bo'shliq bo'lishi va ular kamida 12 ta bo'lishi kerak.</p>";
                }

                btn.disabled = false;
                btn.innerText = "Qayta skanerlash";
            }, 1500);
        });
    </script>
</body>
</html>
