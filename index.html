<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REAL TON SCANNER v5.1</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <!-- To'g'ri ishlaydigan BIP39 -->
    <script src="https://cdn.jsdelivr.net/npm/bip39@3.0.4/dist/index.browser.js"></script>

    <!-- To'g'ri TONWEB CDN -->
    <script src="https://unpkg.com/tonweb@0.0.66/dist/tonweb.js"></script>
</head>

<body class="bg-black text-white font-mono p-6">

<div class="max-w-xl mx-auto bg-[#111] p-6 rounded-2xl border border-blue-500/40">

    <h1 class="text-center text-xl font-bold text-blue-400 mb-4">
        REAL TON MULTI-SCANNER v5.1
    </h1>

    <div id="terminal" class="bg-black h-80 overflow-y-auto p-3 rounded-xl text-xs border border-slate-800">
    </div>

    <button id="startBtn" class="w-full bg-blue-600 py-3 mt-4 rounded-xl font-bold hover:bg-blue-500">
        START
    </button>

    <button id="stopBtn" class="w-full bg-red-600 py-3 mt-3 rounded-xl font-bold hidden hover:bg-red-500">
        STOP
    </button>
</div>

<script>

const tonweb = new TonWeb();

function log(msg, color="text-slate-400") {
    const box = document.getElementById("terminal");
    const p = document.createElement("p");
    p.className = color;
    p.innerText = `[${new Date().toLocaleTimeString()}]  ${msg}`;
    box.prepend(p);
}

let running = false;

async function scan() {

    while (running) {

        try {
            const mnemonic = bip39.generateMnemonic(256);
            log("Mnemonic created", "text-blue-400");

            const seed = await bip39.mnemonicToSeed(mnemonic);
            const keyPair = TonWeb.utils.keyPairFromSeed(seed.slice(0, 32));

            const WalletClass = tonweb.wallet.all.v4R2;
            const wallet = new WalletClass(tonweb.provider, { publicKey: keyPair.publicKey });
            const address = await wallet.getAddress();
            const addrStr = address.toString(true, true, true);

            log("Checking " + addrStr.substring(0, 14) + "...");

            await new Promise(r => setTimeout(r, 300));

        } catch (err) {
            log("ERROR: " + err.message, "text-red-500");
        }
    }
}

document.getElementById("startBtn").onclick = () => {
    running = true;
    document.getElementById("startBtn").classList.add("hidden");
    document.getElementById("stopBtn").classList.remove("hidden");

    log("Scanner started!", "text-green-400");

    scan();
};

document.getElementById("stopBtn").onclick = () => {
    running = false;
    document.getElementById("stopBtn").classList.add("hidden");
    document.getElementById("startBtn").classList.remove("hidden");

    log("Scanner stopped.", "text-red-400");
};

</script>

</body>
</html>
