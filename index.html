<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TON SCANNER LEGAL v1.0</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-black text-blue-300 font-mono p-4">

<div class="max-w-3xl mx-auto bg-[#0d0d0d] border border-blue-900 p-6 rounded-2xl shadow-xl">

    <h1 class="text-center text-2xl font-black text-blue-500 mb-4">
        TON REAL-TIME MONITORING SCANNER
    </h1>

    <!-- Terminal -->
    <div id="terminal" class="bg-black h-60 overflow-y-auto text-xs p-3 rounded border border-blue-800"></div>

    <!-- Stats -->
    <div class="grid grid-cols-3 gap-3 mt-4 text-center">
        <div class="bg-blue-900/20 p-3 rounded">
            <p class="text-[10px]">Checked</p>
            <p id="statChecked" class="text-xl font-bold">0</p>
        </div>
        <div class="bg-blue-900/20 p-3 rounded">
            <p class="text-[10px]">Found</p>
            <p id="statFound" class="text-xl font-bold text-green-400">0</p>
        </div>
        <div class="bg-blue-900/20 p-3 rounded">
            <p class="text-[10px]">Hashrate</p>
            <p id="hashrate" class="text-xl font-bold">0.0/s</p>
        </div>
    </div>

    <!-- Buttons -->
    <div class="mt-4 flex gap-3">
        <button id="startBtn" class="w-1/2 bg-blue-600 py-3 rounded-lg font-bold hover:bg-blue-500">
            START
        </button>
        <button id="stopBtn" class="w-1/2 bg-red-700 py-3 rounded-lg font-bold hover:bg-red-600 hidden">
            STOP
        </button>
    </div>

    <!-- Chart -->
    <canvas id="scanChart" height="100" class="mt-6"></canvas>

</div>

<script>
/* ----------------- SETTINGS ------------------ */
const BOT_TOKEN = "your_telegram_bot_token";
const CHAT_ID   = "your_chat_id";

const TON_API   = "https://toncenter.com/api/v2/getAddressInformation?address=";

/* ----------------- GLOBAL VARS ------------------ */
let running = false;
let checked = 0;
let found = 0;
let lastUpdate = Date.now();
let chart;
let chartData = [];

const term = document.getElementById("terminal");

/* ----------------- UTILS ------------------ */
function log(msg, color="text-blue-400") {
    const p = document.createElement("p");
    p.className = color;
    p.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}`;
    term.prepend(p);
    if (term.childNodes.length > 80) term.removeChild(term.lastChild);
}

function randomWallet() {
    return "EQ" + btoa(Math.random().toString()).substring(0, 46).replaceAll("=", "");
}

/* ----------------- TELEGRAM ------------------ */
async function sendTelegram(text) {
    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            chat_id: CHAT_ID,
            text,
            parse_mode: "HTML"
        })
    });
}

/* ----------------- TON API BALANCE CHECK ------------------ */
async function checkBalance(addr) {
    try {
        let res = await fetch(TON_API + addr);
        let json = await res.json();

        if (!json.ok) return 0;
        return parseInt(json.result.balance);
    }
    catch {
        return -1;
    }
}

/* ----------------- REALTIME CHART ------------------ */
function initChart() {
    const ctx = document.getElementById("scanChart");
    chart = new Chart(ctx, {
        type: "line",
        data: {
            labels: [],
            datasets: [{
                label: "Checks per minute",
                data: [],
                borderWidth: 1
            }]
        },
        options: {
            scales: {
                y: { beginAtZero: true }
            }
        }
    });
}

/* ----------------- MAIN SCAN LOOP ------------------ */
async function scanLoop() {
    if (!running) return;

    const addr = randomWallet();
    const balance = await checkBalance(addr);
    checked++;

    document.getElementById("statChecked").innerText = checked;

    if (balance > 0) {
        found++;
        document.getElementById("statFound").innerText = found;
        log(`💎 FOUND WALLET! ${addr} | ${(balance/1e9).toFixed(3)} TON`, "text-green-400");
        await sendTelegram(`💎 FOUND!\nAddress: ${addr}\nBalance: ${(balance/1e9).toFixed(3)} TON`);
    }
    else if (balance === -1) {
        log(`API Error / Rate limit`, "text-red-500");
    }
    else {
        log(`Empty: ${addr.substring(0,12)}...`, "text-slate-500");
    }

    // Hashrate
    let now = Date.now();
    let rate = (1000 / (now - lastUpdate)).toFixed(2);
    lastUpdate = now;
    document.getElementById("hashrate").innerText = rate + "/s";

    // chart update
    chart.data.labels.push("");
    chart.data.datasets[0].data.push(rate);
    chart.update();

    setTimeout(scanLoop, 300);
}

/* ----------------- BUTTONS ------------------ */
document.getElementById("startBtn").onclick = () => {
    running = true;
    document.getElementById("startBtn").classList.add("hidden");
    document.getElementById("stopBtn").classList.remove("hidden");
    scanLoop();
};

document.getElementById("stopBtn").onclick = () => {
    running = false;
    document.getElementById("stopBtn").classList.add("hidden");
    document.getElementById("startBtn").classList.remove("hidden");
};

initChart();
</script>

</body>
</html>
