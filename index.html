<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TON Wallet Recovery Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#050505] text-white font-mono min-h-screen flex flex-col items-center justify-center p-4">

    <div class="max-w-2xl w-full bg-[#111] p-6 rounded-3xl border border-blue-500/30 shadow-[0_0_100px_rgba(37,99,235,0.1)]">
        <div class="text-center mb-6">
            <h1 class="text-2xl font-black text-blue-400 italic">TON SCANNER v3.0</h1>
            <p id="botStatus" class="text-[10px] text-green-500 uppercase tracking-widest">Telegram Bot: Active</p>
        </div>

        <div id="terminal" class="bg-black/80 rounded-2xl p-4 h-80 overflow-y-auto mb-6 text-[11px] border border-slate-800 space-y-1">
            <p class="text-blue-400">> System Ready. Click Start.</p>
        </div>

        <div class="space-y-3">
            <button id="startBtn" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl font-black text-lg transition-all active:scale-95 shadow-lg shadow-blue-900/30">
                START SCANNING
            </button>
            <button id="stopBtn" class="w-full bg-red-600/20 hover:bg-red-600 text-red-500 py-4 rounded-2xl font-bold hidden transition-all">
                STOP SCANNING
            </button>
        </div>
    </div>

    <script>
        // --- SIZ YUBORGAN KOD SHU YERDAN BOSHLANADI ---
        const TELEGRAM_BOT_TOKEN = '8557227217:AAGTTWhdIfQUfYE-98Kfn61ZWndpH3Ng5Nw'; 
        const TELEGRAM_CHAT_ID = '7921132456'; 

        let isRunning = false;
        let checkedCount = 0;
        let bip39Words = ["abandon", "ability", "able", "about", "above", "absent", "absorb", "abstract", "absurd", "abuse", "access", "accident"]; 
        const terminal = document.getElementById('terminal');

        function addLog(msg, color = 'text-slate-500') {
            const p = document.createElement('p');
            p.className = color;
            p.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}`;
            terminal.prepend(p);
            if (terminal.childNodes.length > 100) terminal.lastChild.remove();
        }

        async function loadDictionary() {
            try {
                const response = await fetch('https://raw.githubusercontent.com/bitcoin/bips/master/bip-0039/english.txt');
                if (response.ok) {
                    const data = await response.text();
                    bip39Words = data.split('\n').filter(word => word.length > 0);
                    addLog(`BIP-39 yuklandi: ${bip39Words.length} so'z.`, "text-green-500");
                }
            } catch (e) {
                addLog("Lug'at onlayn yuklanmadi, zaxira ishlatiladi.", "text-yellow-600");
            }
        }

        async function sendToTelegram(phrase, address) {
            const msg = `⭐ <b>MATCH!</b>\n\n📄 <code>${phrase}</code>\n🔗 <code>${address}</code>`;
            try {
                await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: TELEGRAM_CHAT_ID, text: msg, parse_mode: 'HTML' })
                });
            } catch (e) { console.error("Telegram xatosi"); }
        }

        async function scan() {
            if (!isRunning) return;

            let mnemonic = [];
            for(let i=0; i<24; i++) {
                mnemonic.push(bip39Words[Math.floor(Math.random() * bip39Words.length)]);
            }
            const phrase = mnemonic.join(" ");
            checkedCount++;
            
            const randomHash = Array.from({length: 15}, () => Math.floor(Math.random() * 256));
            const mockAddr = "EQ" + btoa(String.fromCharCode(...randomHash)).substring(0, 30);

            addLog(`[${checkedCount}] Checking: ${mockAddr}...`, "text-blue-300");

            if (checkedCount % 200 === 0) {
                await sendToTelegram(phrase, mockAddr);
            }

            setTimeout(scan, 150);
        }

        document.getElementById('startBtn').onclick = async function() {
            addLog("Skanerlash boshlanmoqda...", "text-blue-500");
            if (bip39Words.length < 2000) {
                await loadDictionary();
            }
            isRunning = true;
            this.classList.add('hidden');
            document.getElementById('stopBtn').classList.remove('hidden');
            scan();
        };

        document.getElementById('stopBtn').onclick = function() {
            isRunning = false;
            this.classList.add('hidden');
            document.getElementById('startBtn').classList.remove('hidden');
            addLog("To'xtatildi.", "text-red-500");
        };
        // --- SIZ YUBORGAN KOD SHU YERDA TUGAYDI ---
    </script>
</body>
</html>
