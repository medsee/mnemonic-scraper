<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TON Miner Scanner</title>

    <style>
        body {
            background: #0c0f20;
            font-family: Arial;
            color: white;
            text-align: center;
            padding: 20px;
        }
        .box {
            background: #161a33;
            padding: 20px;
            border-radius: 12px;
            width: 350px;
            margin: auto;
        }
        input {
            width: 90%;
            padding: 12px;
            margin-top: 15px;
            border: none;
            border-radius: 8px;
            background: #0f1328;
            color: white;
        }
        button {
            width: 95%;
            padding: 12px;
            margin-top: 15px;
            background: #1fa3ff;
            color: white;
            border: none;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
        }
        #graph {
            width: 100%;
            height: 140px;
            background: #0f1328;
            margin-top: 20px;
            border-radius: 10px;
            position: relative;
            overflow: hidden;
        }
        #graph_line {
            position: absolute;
            bottom: 0;
            height: 2px;
            background: #1fa3ff;
            width: 3px;
        }
        .history-box {
            margin-top: 25px;
            text-align: left;
            background: #11152e;
            padding: 15px;
            border-radius: 8px;
            max-height: 150px;
            overflow-y: auto;
        }
        .history-item {
            padding: 5px 0;
            border-bottom: 1px solid #22284d;
        }
    </style>
</head>

<body>

<h2>TON Miner Checker</h2>

<div class="box">
    <input id="wallet" placeholder="Wallet address">
    <button onclick="startScan()">Start Scan</button>
    <p id="status"></p>

    <h3>Wallet Balance</h3>
    <p id="balance">0 TON</p>

    <h3>Real-Time Hashrate</h3>
    <div id="graph">
        <div id="graph_line"></div>
    </div>

    <h3>Scan History</h3>
    <div class="history-box" id="scan_history"></div>
</div>

<script>
const backend = "https://YOUR_BACKEND_URL"; // 🔥 SHU YERNI O'ZGARTIRASAN

// =======================
// 📌 REAL-TIME GRAPH
// =======================
let x = 0;
setInterval(() => {
    let graph = document.getElementById("graph_line");
    x += 8;
    if (x > 350) x = 0;

    let h = Math.floor(Math.random() * 110) + 10;
    graph.style.left = x + "px";
    graph.style.height = h + "px";
}, 150);

// =======================
// 📌 TON BALANCE CHECK API
// =======================
async function getBalance(wallet) {
    try {
        let res = await fetch(`https://tonapi.io/v2/accounts/${wallet}`);
        let data = await res.json();
        let balance = (data.balance / 1000000000).toFixed(2);
        document.getElementById("balance").innerHTML = balance + " TON";
    } catch {
        document.getElementById("balance").innerHTML = "Error";
    }
}

// =======================
// 📌 SCAN + TELEGRAM ALERT
// =======================
function startScan() {
    let wallet = document.getElementById("wallet").value;
    if (!wallet) return alert("Wallet kiriting!");

    document.getElementById("status").innerHTML = "⏳ Scanning...";

    // balans tekshir
    getBalance(wallet);

    // backendga scan yubor
    fetch(`${backend}/api/scan`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({wallet: wallet})
    })
    .then(res => res.json())
    .then(() => {
        document.getElementById("status").innerHTML = "✔ Completed — Check Telegram bot";
        saveHistory(wallet);
        loadHistory();
    });
}

// =======================
// 📌 SCAN TARIXINI SAQLASH
// =======================
function saveHistory(wallet) {
    let history = JSON.parse(localStorage.getItem("scan_history") || "[]");
    history.unshift({
        wallet: wallet,
        time: new Date().toLocaleString()
    });
    localStorage.setItem("scan_history", JSON.stringify(history));
}

function loadHistory() {
    let history = JSON.parse(localStorage.getItem("scan_history") || "[]");
    let box = document.getElementById("scan_history");
    box.innerHTML = "";

    history.forEach(h => {
        box.innerHTML += `
            <div class="history-item">
                <b>${h.wallet}</b><br>
                <small>${h.time}</small>
            </div>
        `;
    });
}

loadHistory();
</script>

</body>
</html>
