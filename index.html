<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>TON REAL SCANNER v5.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/tonweb@0.0.66/dist/tonweb.js"></script>
</head>
<body class="bg-black text-blue-400 font-mono p-5">

    <div class="max-w-xl mx-auto border border-blue-900 p-6 rounded-xl bg-slate-950">
        <h1 class="text-center text-xl font-bold mb-4">TON REAL-TIME SCANNER</h1>
        
        <div id="terminal" class="h-64 overflow-y-auto bg-black p-3 text-[10px] border border-blue-900/50 mb-4 rounded">
            <p>> System initialized. Ready to derive addresses...</p>
        </div>

        <button id="startBtn" class="w-full bg-blue-700 text-white py-3 rounded hover:bg-blue-600 transition">START SCANNING</button>
        
        <div class="mt-4 text-[9px] text-slate-500">
            <p>API Status: <span class="text-green-500">Connected</span></p>
            <p>Method: BIP39 Mnemonic to v4R2 Wallet</p>
        </div>
    </div>

    <script>
        const tonweb = new TonWeb();
        const terminal = document.getElementById('terminal');
        let isRunning = false;
        let words = [];

        // BIP39 lug'atini yuklash
        async function loadWords() {
            const res = await fetch('https://raw.githubusercontent.com/bitcoin/bips/master/bip-0039/english.txt');
            const text = await res.text();
            words = text.split('\n').filter(w => w.length > 0);
            log("Dictionary Loaded: 2048 words.", "text-green-400");
        }

        function log(msg, color = "text-blue-300") {
            const p = document.createElement('p');
            p.className = color;
            p.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}`;
            terminal.prepend(p);
            if(terminal.childNodes.length > 50) terminal.lastChild.remove();
        }

        async function scan() {
            if(!isRunning) return;

            try {
                // 1. 24 ta tasodifiy so'z tanlash
                let mnemonic = [];
                for(let i=0; i<24; i++) {
                    mnemonic.push(words[Math.floor(Math.random() * words.length)]);
                }
                const phrase = mnemonic.join(" ");

                // 2. So'zlardan Seed (kalit) yaratish
                const seed = await tonweb.utils.mnemonicToSeed(mnemonic);
                const keyPair = tonweb.utils.keyPairFromSeed(seed);
                
                // 3. Haqiqiy v4R2 hamyon manzilini hisoblash
                const WalletClass = tonweb.wallet.all['v4R2'];
                const wallet = new WalletClass(tonweb.provider, { publicKey: keyPair.publicKey });
                const address = await wallet.getAddress();
                const addrStr = address.toString(true, true, true);

                // 4. Balansni tekshirish
                const balance = await tonweb.provider.getBalance(addrStr);

                if(parseInt(balance) > 0) {
                    log(`💰 FOUND! ${addrStr} | Balance: ${balance/1000000000} TON`, "text-yellow-400 font-bold");
                    // Bu yerda Telegramga yuborish funksiyasini chaqirishingiz mumkin
                } else {
                    log(`Checking: ${addrStr.substring(0,12)}... [Empty]`, "text-slate-600");
                }

            } catch (e) {
                log("Error derivation: API Limit or invalid seed", "text-red-500");
            }

            setTimeout(scan, 500); // API bloklamasligi uchun biroz kutish
        }

        document.getElementById('startBtn').onclick = async function() {
            if(words.length === 0) await loadWords();
            isRunning = !isRunning;
            this.innerText = isRunning ? "STOP" : "START SCANNING";
            this.className = isRunning ? "w-full bg-red-900 text-white py-3 rounded" : "w-full bg-blue-700 text-white py-3 rounded";
            if(isRunning) scan();
        };
    </script>
</body>
</html>
