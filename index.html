<script>
    const btn = document.querySelector('button');
    const statusBox = document.querySelector('.bg-slate-900 code');

    btn.addEventListener('click', () => {
        // Tugmani vaqtincha o'chirish
        btn.disabled = true;
        btn.innerText = "Skanerlanmoqda...";
        btn.classList.add('opacity-50', 'cursor-not-allowed');

        // Skanerlash jarayonini simulyatsiya qilish
        let logs = [
            "<br># Scanning files...",
            "<br># Accessing scraper.py...",
            "<br># Searching mnemonics...",
            "<br># Results: 0 found (Test mode)"
        ];

        let i = 0;
        const interval = setInterval(() => {
            if (i < logs.length) {
                statusBox.innerHTML += logs[i];
                i++;
            } else {
                clearInterval(interval);
                btn.disabled = false;
                btn.innerText = "Qayta skanerlash";
                btn.classList.remove('opacity-50', 'cursor-not-allowed');
                alert("Skanerlash yakunlandi! (Eslatma: Bu demo rejim)");
            }
        }, 800);
    });
</script>
