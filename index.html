<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TON Scanner Pro + Telegram</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/tonweb@0.0.66/dist/tonweb.bundle.js"></script>
</head>
<body class="bg-[#050505] text-white font-mono min-h-screen flex flex-col items-center justify-center p-4">

    <div class="max-w-2xl w-full bg-[#111] p-6 rounded-3xl border border-blue-500/30 shadow-[0_0_100px_rgba(37,99,235,0.1)]">
        <div class="text-center mb-6">
            <h1 class="text-2xl font-black text-blue-500 italic">TON SCANNER v3.0</h1>
            <p id="botStatus" class="text-[10px] text-green-500 uppercase tracking-widest">Telegram Bot: Active</p>
        </div>

        <div id="terminal" class="bg-black/80 rounded-2xl p-4 h-64 overflow-y-auto mb-6 text-[11px] border border-slate-800 space-y-1">
            <p class="text-blue-400">> System ready...</p>
        </div>

        <div class="space-y-3">
            <button id="startBtn" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl font-black text-lg transition-all active:scale-95">
                START SCANNING
            </button>
            <button id="stopBtn" class="w-full bg-red-600/20 hover:bg-red-600 text-red-500 py-4 rounded-2xl font-bold hidden transition-all">
                STOP
            </button>
        </div>
    </div>

    <script>
        // Ma'lumotlaringizni o'zgaruvchilarga saqlab qo'yamiz
        const TELEGRAM_BOT_TOKEN = '8557227217:AAGTTWhdIfQUfYE-98Kfn61ZWndpH3Ng5Nw'; 
        const TELEGRAM_CHAT_ID = '7921132456'; 

        const words = ["abandon", "ability", "able", "about", "above", "absent", "absorb", "abstract", "absurd", "abuse", "access", "accident", "account", "accuse", "achieve", "acid", "acoustic", "acquire", "across", "act", "action", "actor", "actress", "actual", "adapt", "add", "addict", "address", "adjust", "admit", "adult", "advance", "advice", "aerobic", "apple", "banana", "cherry", "danger", "echo", "family", "galaxy", "hello", "iron", "jacket", "kangaroo", "laptop", "matrix", "nature", "ocean", "pioneer", "quantum", "radar", "satoshi", "tiger", "uniform", "vintage", "wisdom", "xray", "yellow", "zebra"];

        let isRunning = false;
        let checkedCount = 0;
        const terminal = document.getElementById('terminal');

        async function sendToTelegram(phrase) {
            const msg = `⭐ <b>HAMYON TOPILDI!</b>\n\n📄 Kalit: <code>${phrase}</code>\n🔗 Tarmoq: TON Mainnet`;
            try {
                // Fetch URL ichida o'zgaruvchilardan foydalanamiz
                await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: TELEGRAM_CHAT_ID, text: msg, parse_mode: 'HTML' })
                });
            } catch (e) { console.log("Telegram error:", e); }
        }

        function addLog(msg, color = 'text-slate-500') {
            const p = document.createElement('p');
            p.className = color;
            p.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}`;
            terminal.prepend(p);
            if (terminal.childNodes.length > 50) terminal.lastChild.remove();
        }

        function scan() {
            if (!isRunning) return;

            let mnemonic = [];
            for(let i=0; i<24; i++) mnemonic.push(words[Math.floor(Math.random() * words.length)]);
            const phrase = mnemonic.join(" ");
            
            checkedCount++;
            addLog(`Checking: EQ${Math.random().toString(36).substring(7).toUpperCase()}...`, 'text-blue-300');

            // TEST UCHUN: Har 100-chi urinishda telegramga xabar yuboradi
            if (checkedCount % 100 === 0) {
                addLog(`⭐ MATCH! Sending to Telegram...`, 'text-green-400');
                sendToTelegram(phrase);
            }

            setTimeout(scan, 200);
        }

        document.getElementById('startBtn').addEventListener('click', () => {
            isRunning = true;
            document.getElementById('startBtn').classList.add('hidden');
            document.getElementById('stopBtn').classList.remove('hidden');
            scan();
        });

        document.getElementById('stopBtn').addEventListener('click', () => {
            isRunning = false;
            document.getElementById('stopBtn').classList.add('hidden');
            document.getElementById('startBtn').classList.remove('hidden');
        });
    </script>
</body>
</html>
