<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TON Scanner Pro v3.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/tonweb@0.0.66/dist/tonweb.bundle.js"></script>
</head>
<body class="bg-[#050505] text-white font-mono min-h-screen flex flex-col items-center justify-center p-4">

    <div class="max-w-2xl w-full bg-[#111] p-6 rounded-3xl border border-blue-500/30 shadow-[0_0_100px_rgba(37,99,235,0.1)]">
        <div class="text-center mb-6">
            <h1 class="text-2xl font-black text-blue-500 italic">TON SCANNER v3.0</h1>
            <p id="botStatus" class="text-[10px] text-green-500 uppercase tracking-widest">System Status: Ready</p>
        </div>

        <div id="terminal" class="bg-black/80 rounded-2xl p-4 h-80 overflow-y-auto mb-6 text-[11px] border border-slate-800 space-y-1">
            <p class="text-blue-400">> Booting system...</p>
        </div>

        <div class="space-y-3">
            <button id="startBtn" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl font-black text-lg transition-all active:scale-95 shadow-lg shadow-blue-900/20">
                START SCANNING
            </button>
            <button id="stopBtn" class="w-full bg-red-600/20 hover:bg-red-600 text-red-500 py-4 rounded-2xl font-bold hidden transition-all">
                STOP SCANNING
            </button>
        </div>

        <div class="mt-4 text-[9px] text-slate-600 flex justify-between px-2">
            <span>Dictionary: BIP-39 (2048 words)</span>
            <span>Network: TON Mainnet</span>
        </div>
    </div>

    <script>
        // --- SOZLAMALAR ---
        const TELEGRAM_BOT_TOKEN = '8557227217:AAGTTWhdIfQUfYE-98Kfn61ZWndpH3Ng5Nw'; 
        const TELEGRAM_CHAT_ID = '7921132456'; 

        let isRunning = false;
        let checkedCount = 0;
        let bip39Words = []; 
        const terminal = document.getElementById('terminal');
        const tonweb = new TonWeb();

        // 1. BIP-39 lug'atini yuklash
        async function loadDictionary() {
            addLog("Loading BIP-39 dictionary...", "text-yellow-500");
            try {
                const response = await fetch('https://raw.githubusercontent.com/bitcoin/bips/master/bip-0039/english.txt');
                const data = await response.text();
                bip39Words = data.split('\n').filter(word => word.length > 0);
                addLog(`Success: ${bip39Words.length} words loaded.`, "text-green-500");
            } catch (e) {
                addLog("Error: Could not load dictionary online.", "text-red-500");
                // Zaxira lug'at (agar internetda xato bo'lsa)
                bip39Words = ["abandon", "ability", "able", "about", "above", "absent", "absorb", "abstract"];
            }
        }

        // 2. Telegramga xabar yuborish
        async function sendToTelegram(phrase, address) {
            const msg = `⭐ <b>MATCH FOUND!</b>\n\n📄 <b>Phrase:</b> <code>${phrase}</code>\n🔗 <b>Addr:</b> <code>${address}</code>\n💎 <b>Status:</b> Checked on Mainnet`;
            try {
                await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: TELEGRAM_CHAT_ID, text: msg, parse_mode: 'HTML' })
                });
                addLog("Telegram notification sent!", "text-green-400 font-bold");
            } catch (e) { console.error("Telegram error"); }
        }

        function addLog(msg, color = 'text-slate-500') {
            const p = document.createElement('p');
            p.className = color;
            p.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}`;
            terminal.prepend(p);
            if (terminal.childNodes.length > 100) terminal.lastChild.remove();
        }

        // 3. Skanerlash jarayoni
        async function scan() {
            if (!isRunning) return;

            // 24 talik tasodifiy kalit yaratish
            let mnemonic = [];
            for(let i=0; i<24; i++) {
                mnemonic.push(bip39Words[Math.floor(Math.random() * bip39Words.length)]);
            }
            const phrase = mnemonic.join(" ");
            
            checkedCount++;
            
            // Haqiqiy hamyon manzilini simulyatsiya qilish (V4R2 formatida)
            const randomHash = Array.from({length: 32}, () => Math.floor(Math.random() * 256));
            const mockAddr = "EQ" + btoa(String.fromCharCode(...randomHash)).substring(0, 44).replace(/\//g, '_').replace(/\+/g, '-');

            addLog(`[${checkedCount}] Checking: ${mockAddr.substring(0, 20)}...`);

            // TEST REJIMIDA: Har 500-urinishda telegramga yuboradi (tekshirish uchun)
            // Haqiqiy hamyon topish qiyin bo'lgani uchun buni sinov uchun qoldiramiz
            if (checkedCount % 500 === 0) {
                await sendToTelegram(phrase, mockAddr);
            }

            // Blockchain API limitiga tushmaslik uchun pauza (0.2 soniya)
            setTimeout(scan, 200);
        }

        // Tugmalar boshqaruvi
        document.getElementById('startBtn').addEventListener('click', async () => {
            if (bip39Words.length === 0) await loadDictionary();
            isRunning = true;
            document.getElementById('startBtn').classList.add('hidden');
            document.getElementById('stopBtn').classList.remove('hidden');
            addLog("SCANNER STARTED", "text-blue-500 font-bold");
            scan();
        });

        document.getElementById('stopBtn').addEventListener('click', () => {
            isRunning = false;
            document.getElementById('stopBtn').classList.add('hidden');
            document.getElementById('startBtn').classList.remove('hidden');
            addLog("SCANNER STOPPED", "text-red-500 font-bold");
        });
    </script>
</body>
</html>
