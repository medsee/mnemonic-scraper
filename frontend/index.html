<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TON Scanner</title>

    <style>
        body {
            background: #0a0f24;
            color: #fff;
            font-family: Arial, sans-serif;
            text-align: center;
        }
        .box {
            width: 400px;
            margin: 40px auto;
            padding: 25px;
            background: #101832;
            border-radius: 15px;
            border: 1px solid #1f2947;
        }
        #hashrate {
            font-size: 22px;
            margin-top: 15px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }
        #status {
            margin-top: 20px;
            font-size: 18px;
            color: #66d9ff;
        }
    </style>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>

<body>

    <h1>TON Scanner Dashboard</h1>

    <div class="box">
        <h2>Real-time Hashrate</h2>
        <div id="hashrate">0 H/s</div>
        <div id="status">Ulanmoqda...</div>
    </div>

    <script>
        const socket = io();

        socket.on("connect", () => {
            document.getElementById("status").innerText = "Ulandi ✓";
        });

        socket.on("hashrate", (data) => {
            document.getElementById("hashrate").innerText = data + " H/s";
        });

        socket.on("disconnect", () => {
            document.getElementById("status").innerText = "Aloqa yo‘q...";
        });
    </script>

</body>
</html>
